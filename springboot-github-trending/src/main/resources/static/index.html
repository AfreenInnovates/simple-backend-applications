<!DOCTYPE html>
<html>
<head>
    <title>Trending Repos</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9f9;
            padding: 40px;
            color: #222;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            margin-bottom: 25px;
            color: #7a1c1c;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        select, input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 8px 14px;
            background-color: #8b2c2c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #6e1f1f;
        }

        #results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .repo {
            background: white;
            padding: 16px;
            border-radius: 6px;
            border-left: 4px solid #8b2c2c;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        .repo a {
            font-weight: 500;
            text-decoration: none;
            color: #8b2c2c;
        }

        .repo a:hover {
            text-decoration: underline;
        }

        .meta {
            font-size: 13px;
            color: #555;
            margin: 6px 0;
        }

        .desc {
            font-size: 14px;
        }

        .loader {
            border: 4px solid #eee;
            border-top: 4px solid #8b2c2c;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

<h2>Trending GitHub Repositories</h2>

<div class="controls">
    <select id="duration">
        <option value="day">Day</option>
        <option value="week" selected>Week</option>
        <option value="month">Month</option>
        <option value="year">Year</option>
    </select>

    <input type="number" id="limit" value="5" />

    <button onclick="fetchRepos()">Get Repos</button>
</div>

<div id="loader" class="loader hidden"></div>

<div id="results"></div>

<script>
    async function fetchRepos() {
        const duration = document.getElementById("duration").value;
        const limit = document.getElementById("limit").value;

        const container = document.getElementById("results");
        const loader = document.getElementById("loader");

        container.innerHTML = "";

        loader.classList.remove("hidden");

        try {
            const res = await fetch(`/api/repos?duration=${duration}&limit=${limit}`);
            const data = await res.json();

            loader.classList.add("hidden");

            data.forEach(repo => {
                container.innerHTML += `
                    <div class="repo">
                        <a href="${repo.url}" target="_blank">${repo.name}</a>
                        <div class="meta">🌟 ${repo.stars} | ${repo.language}</div>
                        <div class="desc">${repo.description}</div>
                    </div>
                `;
            });

        } catch (err) {
            loader.classList.add("hidden");
            container.innerHTML = "<p style='color:red'>Error loading data</p>";
        }
    }
</script>

</body>
</html>
